<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group B Monster Rally - Fixed Scaling</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; color: white; }
        #game-viewport { position: relative; width: 600px; height: 400px; margin: 20px auto; border: 6px solid #222; overflow: hidden; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; justify-content: center; align-items: center; flex-direction: column; background: rgba(0,0,0,0.85); z-index: 10; }
        .active-screen { display: flex !important; }
        .menu-card { width: 320px; height: 45px; margin: 6px; background: #111; display: flex; align-items: center; padding-left: 15px; border-left: 4px solid transparent; }
        .active-card { background: #333; border-left: 4px solid #ff3333; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>


<div id="game-viewport">
    <canvas id="mainCanvas" width="600" height="400"></canvas>
    <div id="screen-start" class="screen active-screen">
        <h1 style="letter-spacing: 8px; color: #ff3333; text-shadow: 2px 2px #fff;">MONSTER RALLY</h1>
        <p style="animation: blink 1s infinite; font-size: 1.2em; margin-top: 20px;">PRESS ENTER TO START</p>
    </div>
    <div id="screen-selection" class="screen">
        <h2 id="selection-title" style="color: #ffd700;"></h2>
        <div id="selection-list"></div>
    </div>
    <div id="screen-finish" class="screen">
    <h1 style="color:#00ffcc; letter-spacing:6px;">RACE COMPLETE</h1>

    <div style="margin-top:20px; text-align:center;">
        <p style="font-size:18px;">TIME: <span id="finish-time"></span></p>
        <p style="font-size:18px;">BEST: <span id="best-time"></span></p>

        <p id="rating" style="margin-top:15px; font-size:20px; color:#ffcc00;"></p>
    </div>

    <p style="margin-top:25px; opacity:0.8;">
        PRESS ENTER TO RESTART
    </p>
</div>
</div>


<script>
const canvas = document.getElementById("mainCanvas");
const ctx = canvas.getContext("2d");

/* AUDIO ENGINE */
const AudioEngine = {

    ctx: new (window.AudioContext || window.webkitAudioContext)(),

    engineOsc: null,
    engineGain: null,

    screechSource: null,
    screechGain: null,
    screechFilter: null,

    // -------------------------
    // MENU SOUNDS
    // -------------------------

  menuBeep() {
    if (this.ctx.state === "suspended") {
        this.ctx.resume();
    }

    const t = this.ctx.currentTime;

    // main tone
    const o1 = this.ctx.createOscillator();
    const g1 = this.ctx.createGain();

    o1.type = "square";
    o1.frequency.setValueAtTime(420, t);
    o1.frequency.exponentialRampToValueAtTime(220, t + 0.08);

    g1.gain.setValueAtTime(0.45, t); // 🔊 MUCH louder
    g1.gain.exponentialRampToValueAtTime(0.0001, t + 0.1);

    o1.connect(g1);
    g1.connect(this.ctx.destination);

    o1.start(t);
    o1.stop(t + 0.12);

    // subtle “body” layer (makes it feel richer)
    const o2 = this.ctx.createOscillator();
    const g2 = this.ctx.createGain();

    o2.type = "triangle";
    o2.frequency.setValueAtTime(210, t);

    g2.gain.setValueAtTime(0.22, t);
    g2.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);

    o2.connect(g2);
    g2.connect(this.ctx.destination);

    o2.start(t);
    o2.stop(t + 0.12);
},

menuSelect() {
    const o = this.ctx.createOscillator();
    const noise = this.ctx.createBufferSource();
    const g = this.ctx.createGain();

    const t = this.ctx.currentTime;

    // engine “clunk” tone
    o.type = "square";
    o.frequency.setValueAtTime(180, t);
    o.frequency.exponentialRampToValueAtTime(60, t + 0.12);

    // short noise burst (gear click feel)
    const bufferSize = this.ctx.sampleRate * 0.2;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);

    for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    }

    noise.buffer = buffer;

    const noiseGain = this.ctx.createGain();
    noiseGain.gain.setValueAtTime(0.08, t);
    noiseGain.gain.exponentialRampToValueAtTime(0.0001, t + 0.1);

    o.connect(g);
    noise.connect(noiseGain);

    g.connect(this.ctx.destination);
    noiseGain.connect(this.ctx.destination);

    o.start(t);
    noise.start(t);

    o.stop(t + 0.13);
    noise.stop(t + 0.13);
},

    // -------------------------
    // INIT AUDIO SYSTEM
    // -------------------------

    init() {
        if (this.engineOsc) return;

        // ENGINE SOUND
        this.engineGain = this.ctx.createGain();
        this.engineGain.gain.value = 0;
        this.engineGain.connect(this.ctx.destination);

        this.engineOsc = this.ctx.createOscillator();
        this.engineOsc.type = 'sawtooth';
        this.engineOsc.connect(this.engineGain);
        this.engineOsc.start();

        // SCREECH SOUND (NOISE)
        this.screechGain = this.ctx.createGain();
        this.screechGain.gain.value = 0;
        this.screechGain.connect(this.ctx.destination);

        const bufferSize = this.ctx.sampleRate * 2;
        const noiseBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = noiseBuffer.getChannelData(0);

        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
        }

        this.screechSource = this.ctx.createBufferSource();
        this.screechSource.buffer = noiseBuffer;
        this.screechSource.loop = true;

        this.screechFilter = this.ctx.createBiquadFilter();
        this.screechFilter.type = "bandpass";
        this.screechFilter.frequency.value = 1000;
        this.screechFilter.Q.value = 1.5;

        this.screechSource.connect(this.screechFilter);
        this.screechFilter.connect(this.screechGain);

        this.screechSource.start();
    },

    // -------------------------
    // GAME AUDIO UPDATE
    // -------------------------

    updateAudio(speed, state, isScreeching) {
        if (!this.engineOsc) return;

        let racing = (state === "RACING" && speed > 1);

        // ENGINE
        this.engineGain.gain.setTargetAtTime(
            racing ? Math.max(0.02, speed / 700) : 0,
            this.ctx.currentTime,
            0.05
        );

        this.engineOsc.frequency.setTargetAtTime(
            30 + (speed * 0.4),
            this.ctx.currentTime,
            0.1
        );

        // SCREECH
        let screeching = (racing && isScreeching && speed > 30);

        this.screechGain.gain.setTargetAtTime(
            screeching ? Math.min(0.15, speed / 500) : 0,
            this.ctx.currentTime,
            0.05
        );

        this.screechFilter.frequency.setTargetAtTime(
            800 + (speed * 8) + (Math.random() * 200),
            this.ctx.currentTime,
            0.1
        );
    },

    // -------------------------
    // CRASH SOUND
    // -------------------------

    playCrash() {
        const o = this.ctx.createOscillator();
        const g = this.ctx.createGain();

        o.type = 'sawtooth';
        o.frequency.setValueAtTime(100, this.ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.4);

        g.gain.setValueAtTime(0.2, this.ctx.currentTime);

        o.connect(g);
        g.connect(this.ctx.destination);

        o.start();
        o.stop(this.ctx.currentTime + 0.4);
    }
};

/* DATA */
const cars = [{name:"QUATTRO S1", color:"#ddd", livery:"#ffd700"}, {name:"RS200", color:"#fff", livery:"#00f"}, {name:"R5 TURBO", color:"#eee", livery:"#f00"}];
const lvls = [
{ 
  id:"forest", 
  name:"FOREST", 
  sky:"#4f8f4f", 
  road:"#3b2f2a", 
  propColor:"#2e7d32", 
  bg:"#1b3a1b", 
  part:false 
},
{
  id:"desert",
  name:"DESERT",
  sky:"#f2b36a",
  road:"#a06b3b",
  propColor:"#d9c08a",
  bg:"#caa06a",
  part:"#fbc02d"
},
    {
  id:"monte",
  name:"MONTE CARLO",
  sky:"#2a2f55",
  road:"#1a1a22",
  propColor:"#dcdcdc",
  bg:"#2b2b3a",
  part:"#ffffff"
}
];

/* STATE INITIALIZATION (Fixed start-up crash) */
let state="START", selectedIdx=0, speed=0, playerX=0, steerVel=0, dist=0, raceTime=0, shake=0, keys={}, obstacles=[], scenery=[], particles=[], currentCurve=0, roadCurve=0, bgOffset=0, roadElevation = 0
let maxDistance = 5500;
let currentCar = cars[0], currentLvl = lvls[0], bestTime = localStorage.getItem("bestTime") || 190;

window.onkeydown=e=>{
    if (AudioEngine.ctx.state === 'suspended') AudioEngine.ctx.resume();
    AudioEngine.init(); keys[e.code]=true; handleInput(e.code);
};
window.onkeyup=e=>keys[e.code]=false;

function handleInput(code){
    if (state === "FINISH" && code === "Enter") {
    document.getElementById("screen-finish").classList.remove("active-screen");
    document.getElementById("screen-start").classList.add("active-screen");
    state = "START";
}
    if(state==="START" && code==="Enter") {
    AudioEngine.menuSelect();
    openMenu("CAR");
}
    else if(state==="CAR_SELECT"){
    if(code==="ArrowUp") {
        selectedIdx = Math.max(0, selectedIdx - 1);
        AudioEngine.menuBeep();
    }

    if(code==="ArrowDown") {
        selectedIdx = Math.min(cars.length - 1, selectedIdx + 1);
        AudioEngine.menuBeep();
    }

    if(code==="Enter"){
        AudioEngine.menuSelect();
        currentCar = cars[selectedIdx];
        openMenu("LVL");
    }

    renderMenu(cars);
}
    else if(state==="LVL_SELECT"){
    if(code==="ArrowUp") {
        selectedIdx = Math.max(0, selectedIdx - 1);
        AudioEngine.menuBeep();
    }

    if(code==="ArrowDown") {
        selectedIdx = Math.min(lvls.length - 1, selectedIdx + 1);
        AudioEngine.menuBeep();
    }

    if(code==="Enter"){
        AudioEngine.menuSelect();
        currentLvl = lvls[selectedIdx];
        startRace();
    }

    renderMenu(lvls);
}
}

function openMenu(mode){
    state=mode==="CAR"?"CAR_SELECT":"LVL_SELECT"; selectedIdx=0;
    document.getElementById("selection-title").innerText=mode==="CAR"?"SELECT CAR":"SELECT STAGE";
    renderMenu(mode==="CAR"?cars:lvls);
    document.getElementById("screen-start").classList.remove("active-screen");
    document.getElementById("screen-selection").classList.add("active-screen");
}

function renderMenu(data){ document.getElementById("selection-list").innerHTML=data.map((d,i)=>`<div class="menu-card ${i===selectedIdx?"active-card":""}">${d.name}</div>`).join(""); }

function startRace(){
    state="RACING"; speed=0; playerX=0; steerVel=0; dist=0; raceTime=0; currentCurve=0; bgOffset=0;
    obstacles = Array.from({length:12},(_,i)=>({
    z: i * 800 + 1500,
    off: (Math.random() * 2.4 - 1.2),
    hit:false
}));
    // scenery
    scenery=Array.from({length:25},(_,i)=>({
    z: i*400+200,
    side: (Math.random() < 0.5 ? -1 : 1) * (2 + Math.random() * 2),
    hit: false
}));
    particles=Array.from({length:40}, ()=>({x:Math.random()*600, y:Math.random()*400, s:Math.random()*2+1}));
    document.getElementById("screen-selection").classList.remove("active-screen");
}

function project(pX, pZ, camX, curve) {
    let scale = 160 / pZ;
    let curveOffset = (curve * (pZ / 120) * (pZ / 120)) * 0.6;;
    let yOffset = 0

return {
    x: 300 + curveOffset + (pX - camX) * scale * 400,
    y: 160 + scale * 180 + yOffset,
    w: scale * 400
};
}

function update(){
    let isScreeching = keys["ArrowLeft"] || keys["ArrowRight"];
    AudioEngine.updateAudio(speed, state, isScreeching);
    if(state!=="RACING") return;
   if(keys["ArrowUp"]) speed += 0.4;
    else speed *= 0.985;
    speed = Math.max(0, Math.min(85, speed));
    if(keys["ArrowLeft"]) steerVel -= 0.012; if(keys["ArrowRight"]) steerVel += 0.012;
    steerVel *= 0.80; playerX += steerVel * (speed/100);
    curveTarget =
    curveTarget = (
    Math.sin(dist * 0.00025) * 2.2 +   // big sweeps left/right
    Math.sin(dist * 0.0008) * 0.8      // smaller wiggles
);

// stronger smoothing so it doesn’t “stick”
    currentCurve += (curveTarget - currentCurve) * 0.02;
    currentCurve *= 0.999; // prevents long-term bias drift
    playerX -= currentCurve * (speed / 18000);
    playerX *= 0.999; // prevents long-term drift buildup
    if (playerX < -2.5) playerX = -2.5; if (playerX > 2.5) playerX = 2.5;
    dist += speed * 0.015; raceTime += 0.016;
    bgOffset -= (currentCurve * (speed/200)) + (steerVel * 20);

    particles.forEach(p => {
        p.y += (speed/20) + p.s;
        if(p.y > 400) { p.y = 0; p.x = Math.random()*600; }
    });

    [...obstacles, ...scenery].forEach(o => { o.z -= speed * 0.35; if(o.z < 1){ o.z = 9000; if(o.off !== undefined) o.hit = false; } });
    obstacles.forEach(o => { 
    if(!o.hit && o.z < 120 && o.z > 80 && Math.abs(playerX - o.off) < 0.35){
        o.hit = true; 
        speed *= 0.4; 
        shake = 15; 
        AudioEngine.playCrash(); 
    } 
});

scenery.forEach(o => {
    if(!o.hit && o.z < 120 && o.z > 80 && Math.abs(playerX - o.side) < 0.5){
        o.hit = true;
        speed *= 0.6;   // less punishing than obstacles
        shake = 8;
    }
});

   if (dist > maxDistance && state === "RACING") {

    // update best time
    if (!bestTime || raceTime < bestTime) {
        bestTime = raceTime;
        localStorage.setItem("bestTime", bestTime);
    }

    state = "FINISH";

    // hide other screens
    document.getElementById("screen-selection").classList.remove("active-screen");
    document.getElementById("screen-start").classList.remove("active-screen");

    // show finish screen
    document.getElementById("screen-finish").classList.add("active-screen");

    // update UI
    document.getElementById("finish-time").innerText = raceTime.toFixed(2);
document.getElementById("best-time").innerText = Number(bestTime).toFixed(2);

// -------------------------
// SIMPLE RATING SYSTEM
// -------------------------
let ratingText = "";

if (raceTime < maxDistance / 200) {
    ratingText = "GROUP B LEGEND";
} else if (raceTime < maxDistance / 150) {
    ratingText = "SOLID RUN";
} else if (raceTime < maxDistance / 120) {
    ratingText = "DECENT RUN";
} else {
    ratingText = "YOU MIGHT WANT TO VISIT THE REPAIR SHOP...";
}

document.getElementById("rating").innerText = ratingText;
}
}

function drawProp(x, y, sz, type) {
    // FIXED SCALING: Removed the hard cap that caused shrinking.
    // Instead, we let it grow but cap the MAX visual width relative to car.
    let w = Math.min(sz, 100);
    ctx.save();
    if (type === "forest") {
        ctx.fillStyle = "#3e2723"; ctx.fillRect(x - w*0.1, y - w*0.2, w*0.2, w*0.2);
        ctx.fillStyle = "#2e7d32";
        ctx.beginPath(); ctx.moveTo(x, y-w); ctx.lineTo(x-w*0.5, y-w*0.2); ctx.lineTo(x+w*0.5, y-w*0.2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(x, y-w*0.7); ctx.lineTo(x-w*0.4, y-w*0.1); ctx.lineTo(x+w*0.4, y-w*0.1); ctx.fill();
    } else if (type === "desert") {
        ctx.fillStyle = "#D9CFB0"; ctx.beginPath(); ctx.arc(x, y, w*0.5, Math.PI, 0); ctx.fill();
        ctx.fillStyle = "rgba(0,0,0,0.15)"; ctx.beginPath(); ctx.arc(x, y, w*0.3, Math.PI, Math.PI*1.5); ctx.fill();
    } else {
        ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(x, y, w*0.6, Math.PI, 0); ctx.fill();
        ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.beginPath(); ctx.arc(x, y, w*0.4, Math.PI*1.2, Math.PI*1.8); ctx.fill();
    }
    ctx.restore();
}

function drawCarByType() {
    if (currentCar.name === "QUATTRO S1") drawQuattro();
    else if (currentCar.name === "RS200") drawRS200();
    else if (currentCar.name === "R5 TURBO") drawR5();
}

function drawGroundTires(x, y, spread = 18) {
    ctx.fillStyle = "rgba(0,0,0,0.5)";

    // left tire
    ctx.beginPath();
    ctx.ellipse(x - spread, y + 6, 6, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    // right tire
    ctx.beginPath();
    ctx.ellipse(x + spread, y + 6, 6, 3, 0, 0, Math.PI * 2);
    ctx.fill();
}

// Audi Quattro
function drawQuattro() {
    let x = 300, y = 350;
    drawGroundTires(x, y, 20);
    ctx.save();

// move to center
ctx.translate(x, y);

// 🔥 SCALE HERE (try 1.2–1.4)
ctx.scale(1.25, 1.25);

// rotate AFTER scaling
ctx.rotate(steerVel * 2);

// move back
ctx.translate(-x, -y);

    // shadow
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.fillRect(x-26, y+4, 52, 4);

    // body (white base)
    ctx.fillStyle = "#eaeaea";
    ctx.fillRect(x-25, y-10, 50, 18);

    // wide fenders
    ctx.fillRect(x-30, y-6, 8, 12);
    ctx.fillRect(x+22, y-6, 8, 12);

    // iconic red stripe
    ctx.fillStyle = "#d50000";
    ctx.fillRect(x-25, y-2, 50, 4);

    // rear grille
    ctx.fillStyle = "#222";
    ctx.fillRect(x-15, y-8, 30, 5);

    // wing
    ctx.fillStyle = "#ccc";
    ctx.fillRect(x-20, y-16, 40, 3);
    ctx.fillRect(x-18, y-13, 3, 5);
    ctx.fillRect(x+15, y-13, 3, 5);

    // taillights
    ctx.fillStyle = "red";
    ctx.fillRect(x-22, y-2, 6, 4);
    ctx.fillRect(x+16, y-2, 6, 4);

    ctx.restore();
}


// RS200
function drawRS200() {
    let x = 300, y = 350;

    drawGroundTires(x, y, 22);

    ctx.save();
    ctx.translate(x, y);
    ctx.scale(1.35, 1.35);
    ctx.rotate(steerVel * 2);
    ctx.translate(-x, -y);

    // shadow
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.fillRect(x-24, y+4, 48, 4);

    // main smooth body (lower + tighter)
    ctx.fillStyle = "#f5f5f5";
    ctx.beginPath();
    ctx.moveTo(x-24, y);
    ctx.lineTo(x-18, y-10);
    ctx.lineTo(x+18, y-10);
    ctx.lineTo(x+24, y);
    ctx.closePath();
    ctx.fill();

    // subtle integrated arches (NOT sticking out)
    ctx.fillRect(x-24, y-5, 4, 10);
    ctx.fillRect(x+20, y-5, 4, 10);

    // blue stripe
    ctx.fillStyle = "#1565c0";
    ctx.fillRect(x-20, y-3, 40, 3);

    // rear vent
    ctx.fillStyle = "#222";
    ctx.fillRect(x-12, y-8, 24, 4);

    // taillights (clean + simple)
    ctx.fillStyle = "#ff4444";
    ctx.fillRect(x-18, y-2, 5, 4);
    ctx.fillRect(x+13, y-2, 5, 4);

    ctx.restore();
}


// R5 Turbo
function drawR5() {
    let x = 300, y = 350;

    drawGroundTires(x, y, 22);

    ctx.save();
    ctx.translate(x, y);
    ctx.scale(1.25, 1.25);
    ctx.rotate(steerVel * 2);
    ctx.translate(-x, -y);

    // shadow
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.fillRect(x-26, y+4, 52, 4);

    // main body (LOWER + wider)
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(x-24, y-8, 48, 14);

    // fender bulges (rounded feel, not blocks)
    ctx.fillRect(x-28, y-5, 6, 10);
    ctx.fillRect(x+22, y-5, 6, 10);

    // yellow stripe
    ctx.fillStyle = "#ffcc00";
    ctx.fillRect(x-24, y-2, 48, 3);

    // engine cover (less tall)
    ctx.fillStyle = "#111";
    ctx.fillRect(x-14, y-7, 28, 4);

    // taillights
    ctx.fillStyle = "#ff2222";
    ctx.fillRect(x-20, y-2, 6, 4);
    ctx.fillRect(x+14, y-2, 6, 4);


    ctx.restore();
}

// Forest?
function drawForestBackground(bgOffset) {
    let x = (bgOffset % 600);

    for (let i = -1; i < 2; i++) {
        let drawX = x + (i * 600);

        // sky mountains
        ctx.fillStyle = "#1b3d1b";
        ctx.beginPath();
        ctx.moveTo(drawX, 160);
        ctx.lineTo(drawX + 150, 60);
        ctx.lineTo(drawX + 300, 160);
        ctx.fill();

        ctx.fillStyle = "#142414";
        ctx.beginPath();
        ctx.moveTo(drawX + 200, 160);
        ctx.lineTo(drawX + 350, 80);
        ctx.lineTo(drawX + 500, 160);
        ctx.fill();
    }
}

// Desert?
function drawDesertBackground(bgOffset) {
    let x = (bgOffset % 600);

    for (let i = -1; i < 2; i++) {
        let drawX = x + (i * 600);

        ctx.fillStyle = "#c2a06b";
        ctx.beginPath();
        ctx.moveTo(drawX, 160);
        ctx.lineTo(drawX + 200, 110);
        ctx.lineTo(drawX + 400, 160);
        ctx.fill();

        ctx.fillStyle = "#a07d4f";
        ctx.beginPath();
        ctx.moveTo(drawX + 150, 160);
        ctx.lineTo(drawX + 350, 130);
        ctx.lineTo(drawX + 550, 160);
        ctx.fill();
    }
}

// Monte Carlo?
function drawMonteBackground(bgOffset) {
    let x = (bgOffset % 600);

    for (let i = -1; i < 2; i++) {
        let drawX = x + (i * 600);

        ctx.fillStyle = "#2b2b3a";
        ctx.beginPath();
        ctx.moveTo(drawX, 160);
        ctx.lineTo(drawX + 140, 60);
        ctx.lineTo(drawX + 280, 160);
        ctx.fill();

        ctx.fillStyle = "#1a1a26";
        ctx.beginPath();
        ctx.moveTo(drawX + 200, 160);
        ctx.lineTo(drawX + 360, 40);
        ctx.lineTo(drawX + 520, 160);
        ctx.fill();
    }
}

function draw(){
    ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,600,400);
    function getFog(z) {
    return Math.max(0, Math.min(1, 1 - (z / 4000)));
    }
    if(shake>0){ ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake); shake*=0.9; }
// Sky
    let sky = ctx.createLinearGradient(0, 0, 0, 400);

if (currentLvl.id === "monte") {
    // 🌙 NIGHT SKY (Monte Carlo)
    sky.addColorStop(0, "#050510");   // deep night blue
    sky.addColorStop(0.6, "#0b0b1a"); // horizon glow
    sky.addColorStop(1, "#000000");   // pure night fade
} else {
    // 🌤️ DAY SKY (forest + desert)
    sky.addColorStop(0, "#4aa3ff");
    sky.addColorStop(0.6, "#87c7ff");
    sky.addColorStop(1, "#1a1a2a");
}

ctx.fillStyle = sky;
ctx.fillRect(0, 0, 600, 400);

if (currentLvl.id === "monte") {
    ctx.fillStyle = "rgba(0,0,20,0.35)";
    ctx.fillRect(0, 0, 600, 400);
}
// mountaints
    if (state === "RACING") {
    if (currentLvl.id === "forest") {
        drawForestBackground(bgOffset);
    } else if (currentLvl.id === "desert") {
        drawDesertBackground(bgOffset);
    } else {
        drawMonteBackground(bgOffset);
    }
}
// Road?
ctx.fillStyle = currentLvl.bg;
ctx.fillRect(0, 160, 600, 240);

    if(state!=="RACING") return;


    let fogStrength = 0.85;

for (let i = 100; i > 1; i--) {
    let z1 = i * 40 - (dist % 40);
    let z2 = (i - 1) * 40 - (dist % 40);

    let p1 = project(0, z1, playerX, currentCurve);
    let p2 = project(0, z2, playerX, currentCurve);

    if (p1.y < 160 || p1.y > 400) continue;

    let fog = getFog(z1);

    let altColor = currentLvl.id === "desert"
    ? "#5a3a1f"
    : "#2a2a2a";

let base = (Math.floor((z1 + dist) / 120) % 2)
    ? currentLvl.road
    : altColor;
    // 🚫 IMPORTANT: road itself is NEVER transparent
    ctx.globalAlpha = 1;

    if (currentLvl.id === "monte") {
    ctx.fillStyle = "#111118"; // darker night road
} else {
    ctx.fillStyle = base;
}
    ctx.beginPath();
    ctx.moveTo(p1.x - p1.w, p1.y);
    ctx.lineTo(p1.x + p1.w, p1.y);
    ctx.lineTo(p2.x + p2.w, p2.y);
    ctx.lineTo(p2.x - p2.w, p2.y);
    ctx.fill();
    let stripeCount = 6;

for (let s = 0; s < stripeCount; s++) {
    let t = s / stripeCount;

    let sx1 = p1.x - p1.w - 2;
    let sx2 = p1.x - p1.w - 2;

    let ex1 = p2.x - p2.w - 2;
    let ex2 = p2.x - p2.w - 2;

    let sy1 = p1.y + (p2.y - p1.y) * t;
    let sy2 = p1.y + (p2.y - p1.y) * (t + 1/stripeCount);

    if ((Math.floor((z1 + dist) / 60) + s) % 2 === 0) {
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(sx1, sy1, 3, sy2 - sy1);
    }

    // right side
    if ((Math.floor((z1 + dist) / 60) + s) % 2 === 0) {
        ctx.fillRect(p1.x + p1.w + 2, sy1, 3, sy2 - sy1);
    }
}

    // ✨ fog is ONLY used for highlights (not the road body)
    ctx.globalAlpha = 0.15 * fog;
    ctx.fillStyle = "#ffffff";

    ctx.fillRect(p1.x - p1.w, p1.y, 2, p2.y - p1.y);
    ctx.fillRect(p1.x + p1.w - 2, p1.y, 2, p2.y - p1.y);

    ctx.globalAlpha = 1;
}

    [...scenery, ...obstacles]
.sort((a,b)=>b.z - a.z)
.forEach(o => {

    if(o.z <= 10 || o.z > 4000) return;

    let p = project(o.off ?? o.side, o.z, playerX, currentCurve);

    if(p.y > 160 && p.y < 400) {

        let fog = getFog(o.z);

// props + scenery fade normally
let isObstacle = o.off !== undefined;

if (isObstacle) {
    // obstacles stay more visible for gameplay
    ctx.globalAlpha = 0.35 + (fog * 0.65);
} else {
    // scenery can fade harder
    ctx.globalAlpha = fog;
}

drawProp(p.x, p.y, p.w * 0.7, currentLvl.id);
ctx.globalAlpha = 1;
    }
});

    if(currentLvl.part) {
        ctx.fillStyle = currentLvl.part;
        particles.forEach(p => ctx.fillRect(p.x, p.y, p.s, p.s));
    }

    drawCarByType();
    drawHUD();
function drawHUD() {
    ctx.save();

    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.fillRect(0, 0, 600, 28);
    ctx.fillRect(0, 372, 600, 28);

    ctx.fillStyle = "#ffffff";
    ctx.font = "14px monospace";

    // TIME
    ctx.fillText("TIME " + raceTime.toFixed(2), 10, 18);

    // DIST (we'll update this in step 2)
    let remaining = Math.max(0, Math.floor(maxDistance - dist));
    ctx.fillText("DIST " + remaining, 250, 18);

    // BEST
    if (bestTime) {
        ctx.fillText("BEST " + Number(bestTime).toFixed(2), 480, 18);
    }

    // -----------------------------
    // SPEED BAR (NEW)
    // -----------------------------
    let speedPercent = speed / 85; // max speed cap
    let barWidth = 200 * speedPercent;

    // color shifts green → red
    let r = Math.floor(255 * speedPercent);
    let g = Math.floor(255 * (1 - speedPercent));

    ctx.fillStyle = "rgba(255,255,255,0.2)";
    ctx.fillRect(200, 385, 200, 10);

    ctx.fillStyle = `rgb(${r},${g},0)`;
    ctx.fillRect(200, 385, barWidth, 10);

    ctx.strokeStyle = "#fff";
    ctx.strokeRect(200, 385, 200, 10);

    // CAR NAME (bottom left)
    ctx.fillStyle = "#ffcc00";
    ctx.fillText(currentCar.name, 10, 392);

    ctx.restore();
}
}
function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
